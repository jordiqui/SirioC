# LEGACY NOTICE (P0-39): This default config targets the legacy SirioNNUE1
# PieceCountModel pipeline and is kept for compatibility/test-baseline use.
# New NNUE development should use the SirioNNUE2 v2 scripts/config flow:
# features_v2.py, prepare_dataset_v2.py, train_v2.py, export_to_engine_v2.py,
# build_candidate_v2.py, verify_candidate_v2.py, verified_runtime_load_v2.py.
# Stockfish .nnue compatibility is not claimed.

seed: 20240511

dataset:
  path: training/nnue/datasets/processed/sirio_example.npz
  metadata: training/nnue/datasets/processed/sirio_example.metadata.json
  validation_split: 0.1
  shuffle: true
  shuffle_seed: 20240511

training:
  epochs: 50
  batch_size: 512
  learning_rate: 0.01
  weight_decay: 0.0
  device: cpu
  gradient_clip: null

logging:
  output_dir: training/nnue/metrics
  run_name: sirio_example

checkpoint:
  output_path: training/nnue/weights/sirio_example.pt
  save_every: 5
